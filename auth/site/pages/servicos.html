<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Serviços</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style/css.css">
</head>
<body id="page-servicos" class="iframe-page fade-in">
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-primary"><i class="fas fa-tools me-2"></i>Serviços e Descontos</h2>
            <button class="btn btn-primary px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#servicoModal">
                <i class="fas fa-plus me-2"></i> Novo Item
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Nome</th>
                                <th>Tipo</th>
                                <th>Valor</th>
                                <th class="pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="servicos-table-body">
                            <!-- Conteúdo dinâmico via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Serviço -->
    <div class="modal fade" id="servicoModal" tabindex="-1" aria-labelledby="servicoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content glass-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="servicoModalLabel">Configurar Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-servico" onsubmit="return false;">
                        <input type="hidden" id="servico_id">
                        <div class="mb-3">
                            <label for="servico_nome" class="form-label fw-medium">Nome do Serviço/Desconto</label>
                            <input type="text" class="form-control" id="servico_nome" placeholder="Ex: Formatação, Desconto de Boas-vindas..." required>
                        </div>
                        <div class="mb-3">
                            <label for="servico_tipo" class="form-label fw-medium">Tipo de Operação</label>
                            <select class="form-select fw-bold" id="servico_tipo" required>
                                <option value="servico" selected>Serviço (Soma ao total)</option>
                                <option value="desconto_percentual">Desconto (%) - Subtrai</option>
                                <option value="desconto_fixo">Desconto Fixo (R$) - Subtrai</option>
                            </select>
                        </div>
                         <div class="mb-3">
                            <label for="servico_descricao" class="form-label fw-medium">Descrição Adicional</label>
                            <textarea class="form-control" id="servico_descricao" rows="2" placeholder="Opcional..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="servico_valor" class="form-label fw-medium">Valor</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-tag text-muted"></i></span>
                                <input type="number" step="0.01" class="form-control border-start-0" id="servico_valor" required placeholder="0.00">
                            </div>
                            <small id="valor-help" class="form-text text-muted">Nota: Para descontos %, insira apenas o número (ex: 10 para 10%).</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="salvar-servico-btn" class="btn btn-primary px-5">Salvar Configuração</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/common.js"></script>
    <script src="../script/servicos.js"></script>
</body>
</html>
