<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Ordem de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style/css.css">
    <style>
        /* Estilos para o container de resultados da busca */
        .search-results-container {
            position: relative;
        }
        #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 1000;
            border: 1px solid #ced4da;
            border-top: none;
            max-height: 200px;
            overflow-y: auto;
            display: none; /* Começa escondido */
        }
        .search-result-item {
            padding: 0.75rem 1.25rem;
            background-color: #fff;
            border-bottom: 1px solid #dee2e6;
            cursor: pointer;
        }
        .search-result-item:hover {
            background-color: #f8f9fa;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body id="page-abrir-os" class="iframe-page fade-in">
    <div class="container-fluid p-0">
        <h2 class="mb-4 fw-bold text-primary"><i class="fas fa-plus-circle"></i> Abrir Nova Ordem de Serviço</h2>
        <form id="os-form" class="glass-card p-4" onsubmit="return false;">
            <div class="card-body p-0">
                <h5 class="fw-bold mb-4 text-secondary">1. Dados do Cliente</h5>
                <div class="row">
                    <!-- Campo oculto para guardar o ID do cliente selecionado -->
                    <input type="hidden" id="cliente_id">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium">Nome</label>
                        <div class="search-results-container">
                            <input type="text" class="form-control" id="cliente_nome" placeholder="Busque ou digite o nome..." required autocomplete="off">
                            <!-- Div para exibir os resultados da busca -->
                            <div id="search-results" class="glass-card shadow-lg mt-1 overflow-hidden" style="border-radius: 10px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-medium">Telefone</label>
                        <input type="text" class="form-control" id="cliente_telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-medium">E-mail</label>
                        <input type="email" class="form-control" id="cliente_email" placeholder="cliente@email.com">
                    </div>
                </div>

                <h5 class="fw-bold mb-4 mt-4 text-secondary">2. Informações do Equipamento</h5>
                <div class="mb-3"><label class="form-label fw-medium">Equipamento / Produto</label><input type="text" class="form-control" id="equipamento" placeholder="Ex: Notebook Dell Inspiron" required></div>
                <div class="mb-3"><label class="form-label fw-medium">Problema Informado</label><textarea class="form-control" id="problema" rows="2" placeholder="Descreva o problema relatado pelo cliente..."></textarea></div>
                <div class="mb-3"><label class="form-label fw-medium">Laudo Técnico</label><textarea class="form-control" id="laudo" rows="2" placeholder="Sua análise técnica inicial..."></textarea></div>

                <h5 class="fw-bold mb-4 mt-4 text-secondary">3. Serviços Realizados</h5>
                <div class="input-group mb-4 shadow-sm" style="border-radius: 12px; overflow: hidden;">
                    <select class="form-select border-0 bg-white" id="servicos-select"></select>
                    <button class="btn btn-primary" type="button" id="add-servico-btn">Adicionar</button>
                    <button class="btn btn-outline-primary bg-white" type="button" id="open-avulso-modal-btn">
                        <i class="fas fa-plus"></i> Item Avulso
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>Descrição</th><th style="width: 100px;">Qtd</th><th>Valor Unit.</th><th>Subtotal</th><th style="width: 50px;">Ação</th></tr></thead>
                        <tbody id="servicos-selecionados-body"></tbody>
                    </table>
                </div>
                <hr class="my-4 opacity-10">
                <div class="d-flex justify-content-end align-items-center">
                    <h4 class="me-4 text-muted fw-bold">TOTAL:</h4>
                    <h2 id="total-os" class="text-primary fw-bold">R$ 0,00</h2>
                </div>
            </div>
            <div class="mt-4 pt-3 text-end">
                <button type="reset" class="btn btn-outline-secondary me-2 px-4" id="limpar-form-btn">Limpar</button>
                <button type="button" id="salvar-os-btn" class="btn btn-primary btn-lg px-5"><i class="fas fa-file-pdf me-2"></i>Gerar PDF e Salvar OS</button>
            </div>
        </form>
    </div>

    <!-- Modal para Item Avulso -->
    <div class="modal fade" id="avulsoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar Item Avulso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome do Serviço/Item</label>
                        <input type="text" class="form-control" id="avulso-nome" placeholder="Ex: Limpeza especial">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor</label>
                            <input type="number" step="0.01" class="form-control" id="avulso-valor" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" id="avulso-tipo">
                                <option value="servico">Serviço</option>
                                <option value="peca">Peça</option>
                                <option value="desconto_fixo">Desconto Fixo (R$)</option>
                                <option value="desconto_percentual">Desconto (%)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="add-avulso-btn">Adicionar à OS</button>
                </div>
            </div>
        </div>
    </div>
    <!-- SCRIPTS ESSENCIAIS PARA FUNCIONALIDADE DA PÁGINA -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/common.js"></script>
    <script src="../script/abrir_os.js"></script>
</body>
</html>
