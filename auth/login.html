<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de OS</title>
    <!-- Favicon -->
    <link rel="icon" href="./site/images/logo.jpg" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./site/style/css.css">
</head>
<body id="page-login">

    <div class="login-container fade-in">
        <div class="login-card p-2">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="mb-3">
                        <i class="fas fa-tools fa-3x text-accent"></i>
                    </div>
                    <h2 class="card-title h3">Elias TechMaster</h2>
                    <p class="text-muted small">Gerenciamento de Ordens de Serviço</p>
                </div>
                
                <form id="login-form">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-medium">E-mail de Acesso</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" id="email" placeholder="nome@empresa.com" required autocomplete="email">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <div id="login-error" class="alert alert-danger d-none mb-3 py-2 small" role="alert"></div>

                    <div class="d-grid mt-2">
                        <button type="submit" id="login-button" class="btn btn-primary btn-lg-custom shadow-sm">
                            Acessar Sistema <i class="fas fa-arrow-right ms-2 small"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Agora chama o script de autenticação dedicado -->
    <script src="auth.js"></script>
</body>
</html>
